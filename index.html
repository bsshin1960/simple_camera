<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <!-- PWA / 모바일 웹앱 설치 지원을 위한 메타 태그 -->
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- 캐시 방지 메타 태그 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>심플 카메라 제어기</title>
    <link rel="stylesheet" href="style.css?v=20260625_layout_v6">
    <link rel="manifest" href="manifest.json">
</head>
<body>
    <div class="app-container full-mode" id="app-container">
        <!-- 메인 피드 영역 -->
        <main class="main-content">
            <!-- 문제로 가득 찬 배경 영역 -->
            <div id="questions-area" class="questions-container">
                <!-- Javascript로 문제가 채워집니다 -->
            </div>

            <!-- 카메라 비디오 박스 (최대 화면 디폴트) -->
            <div id="camera-box" class="camera-box full-mode">
                <div class="video-wrapper">
                    <video id="video-stream" autoplay playsinline muted></video>
                </div>
            </div>
        </main>

        <!-- 화면 전체 기준 반투명 컨트롤러 (화면에 커서가 있을 때 표출) -->
        <div id="floating-controls" class="floating-controls">
            <!-- 화면 가장 하단에 배치될 반투명 통합 컨트롤 카드 (슬라이더와 아이콘이 가로로 배치됨) -->
             <div class="controls-card">
                 <!-- 줌 조절 행 (왼쪽) -->
                 <div class="control-row">
                     <span class="slider-label">ZOOM</span>
                     <input type="range" id="zoom-slider" class="slider-input" min="1" max="4" step="0.1" value="1" title="확대/축소">
                     <span id="zoom-badge" class="badge">1.0x</span>
                 </div>
                 
                 <!-- 수직 구분선 -->
                 <div class="controls-card-divider-vertical"></div>
                 
                 <!-- 버튼 그룹 (오른쪽) -->
                 <div class="button-group">
                     <!-- 카메라 기기 전환 버튼 -->
                     <button id="btn-switch-camera" class="floating-btn" title="카메라 전환">
                         <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                             <path d="M23 19a2 2 0 0 1-2 2H3a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h4l2-3h6l2 3h4a2 2 0 0 1 2 2z"/>
                             <circle cx="12" cy="13" r="4"/>
                         </svg>
                     </button>
                     
                     <!-- 화면 회전 버튼 -->
                     <button id="btn-rotate-camera" class="floating-btn" title="화면 회전">
                         <svg class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                             <path d="M23 4v6h-6"/>
                             <path d="M20.49 15a9 9 0 1 1-2.12-9.36L23 10"/>
                         </svg>
                     </button>
                     
                     <!-- 화면 크기 전환 버튼 -->
                     <button id="btn-toggle-screen" class="floating-btn" title="화면 크기 전환">
                          <!-- 축소 아이콘 (기본 최대화면이므로 축소 아이콘 노출) -->
                          <svg id="icon-collapse" class="icon" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                              <path d="M4 14h6v6M20 10h-6V4M14 10l7-7M10 14l-7 7"/>
                          </svg>
                          <!-- 확대 아이콘 (숨김) -->
                          <svg id="icon-expand" class="icon hidden" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                              <path d="M8 3H5a2 2 0 0 0-2 2v3m18 0V5a2 2 0 0 0-2-2h-3m0 18h3a2 2 0 0 0 2-2v-3M3 16v3a2 2 0 0 0 2 2h3"/>
                          </svg>
                     </button>
                 </div>
             </div>
        </div>
    </div>

    <!-- 온스크린 디버그 콘솔 오버레이 -->
    <div id="debug-overlay" class="debug-overlay hidden">
        <div class="debug-header">
            <h3>디버그 로그 모니터</h3>
            <div class="debug-header-btns">
                <button id="btn-clear-cache" class="debug-action-btn warning">캐시초기화</button>
                <button id="btn-close-debug" class="debug-action-btn">닫기</button>
            </div>
        </div>
        <div id="debug-log-list" class="debug-log-list"></div>
    </div>

    <script src="app.js?v=20260625_layout_v6"></script>
</body>
</html>
